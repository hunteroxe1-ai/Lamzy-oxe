<!DOCTYPE html>
<html lang="ny">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Rotator</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        .ad-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        /* Kakonzedwe ka Video ndi Website kuti zizidzaza screen yonse */
        video, iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: cover; /* Kuti video isasiye ma space am mbali */
        }
        /* Bisani website poyamba */
        #page-two {
            display: none;
        }
    </style>
</head>
<body>

<div class="ad-container">
    <video id="page-one" autoplay muted playsinline>
        <source src="Hunter.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <iframe id="page-two" src="IKANI_LINK_YA_WEBSITE_PANO"></iframe>
</div>

<script>
    // Pakatha masekondi 10 (10000 milliseconds)
    setTimeout(function() {
        // Kubisa video
        document.getElementById('page-one').style.display = 'none';
        
        // Kuonetsa website
        document.getElementById('page-two').style.display = 'block';
    }, 10000); // 10000ms = 10 Seconds
</script>

</body>
</html>
